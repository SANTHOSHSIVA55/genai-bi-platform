<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="netflixRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3e4b" />
      <stop offset="60%" stop-color="#e50914" />
      <stop offset="100%" stop-color="#8c141a" />
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff2e3b" />
      <stop offset="100%" stop-color="#e50914" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background shape for contrast -->
  <rect width="512" height="512" rx="128" fill="#000000" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#netflixRed)" stroke-width="8" opacity="0.3" />

  <!-- Neural Connection BI / N Logo -->
  <g transform="translate(116, 96)">
    <!-- Left Column (Bar Chart Stem) -->
    <rect x="0" y="80" width="60" height="240" rx="15" fill="url(#netflixRed)" />
    <circle cx="30" cy="80" r="15" fill="#ff3e4b" />
    
    <!-- Right Column (Bar Chart Stem - Taller) -->
    <rect x="220" y="0" width="60" height="320" rx="15" fill="url(#netflixRed)" />
    <circle cx="250" cy="0" r="15" fill="#ff3e4b" />

    <!-- Connection lines (Neural network style) -->
    <path d="M 30 80 L 140 160 L 250 0" fill="none" stroke="#ff3e4b" stroke-width="6" opacity="0.8" filter="url(#glow)" />
    <path d="M 30 200 L 140 240 L 250 160" fill="none" stroke="#ff2e3b" stroke-width="4" opacity="0.6" />
    
    <!-- Glowing Central AI Node (forming diagonal of N) -->
    <path d="M 30 320 L 250 0" fill="none" stroke="url(#glowRed)" stroke-width="42" stroke-linecap="round" filter="url(#glow)" opacity="0.95" />

    <!-- Small network connection dots -->
    <circle cx="30" cy="200" r="10" fill="#ffffff" filter="url(#glow)" />
    <circle cx="140" cy="160" r="16" fill="#ffffff" filter="url(#glow)" />
    <circle cx="140" cy="240" r="12" fill="#ff3e4b" filter="url(#glow)" />
    <circle cx="250" cy="160" r="10" fill="#ffffff" filter="url(#glow)" />
  </g>
</svg>
